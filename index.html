<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrimonial Profile - Asiya Bathool</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f0f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            background: #ffffff;
            margin: 0 auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .header-tag {
            text-align: center;
            background-color: #e63946;
            color: white;
            padding: 8px 15px;
            font-weight: bold;
            border-radius: 20px;
            display: inline-block;
            margin: 0 auto 20px auto;
            font-size: 14px;
        }
        .header-container {
            text-align: center;
        }
        .profile-img {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 50%;
            display: block;
            margin: 0 auto 20px auto;
            border: 4px solid #d4a373;
        }
        h2 {
            text-align: center;
            color: #2b2d42;
            margin-bottom: 5px;
        }
        h3 {
            text-align: center;
            color: #b58252;
            margin-top: 0;
        }

        /* --- PUTHIYA IMAGE BUTTONS & GALLERY CSS --- */
        .gallery-section {
            text-align: center;
            margin: 20px 0;
        }
        .btn-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .img-toggle-btn {
            background-color: #d4a373;
            color: white;
            border: none;
            padding: 10px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 0; /* Main button style overwriting */
            transition: background 0.3s ease;
        }
        .img-toggle-btn:hover {
            background-color: #b58252;
        }
        .sub-img-box {
            display: none; /* Adyam images hidden aayirikkum */
            margin-top: 15px;
            animation: fadeIn 0.5s ease;
        }
        .sub-img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 10px;
            border: 2px solid #d4a373;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ------------------------------------------- */

        .details-table {
            width: 100%;
            margin-top: 25px;
            border-collapse: collapse;
        }
        .details-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 16px;
        }
        .details-table td.label {
            font-weight: bold;
            color: #555;
            width: 40%;
        }
        .form-section {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 2px dashed #d4a373;
        }
        .form-section h3 {
            color: #e63946;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #444;
            font-size: 14px;
        }
        input[type="text"], input[type="tel"], input[type="number"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus, textarea:focus {
            border-color: #d4a373;
            outline: none;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #2a9d8f;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .submit-btn:hover {
            background-color: #21867a;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="header-container">
        <span class="header-tag"> വരനെ ആവശ്യമുണ്ട് </span>
    </div>

    <img src="asiyamain.jpg" alt="Asiya Bathool" class="profile-img">
    
    <h2>Asiya Bathool</h2>
    <h3>Biodata</h3>

    <div class="gallery-section">
        <div class="btn-container">
            <button class="img-toggle-btn" onclick="toggleImage('img1')">Another Image 1</button>
            <button class="img-toggle-btn" onclick="toggleImage('img2')">Another Image 2</button>
            <button class="img-toggle-btn" onclick="toggleImage('img3')">Another Image 3</button>
            <button class="img-toggle-btn" onclick="toggleImage('img4')">Another Image 4</button>
        </div>

        <div id="img1" class="sub-img-box">
            <img src="asiya4.jpg" alt="Asiya Image 1" class="sub-img">
        </div>
        <div id="img2" class="sub-img-box">
            <img src="asiya5.jpg" alt="Asiya Image 2" class="sub-img">
        </div>
        <div id="img3" class="sub-img-box">
            <img src="asiya6.jpg" alt="Asiya Image 3" class="sub-img">
        </div>
        <div id="img4" class="sub-img-box">
            <img src="asiya7.jpg" alt="Asiya Image 4" class="sub-img">
        </div>
    </div>
    
    <table class="details-table">
        <tr>
            <td class="label">Name (പേര്)</td>
            <td>Asiya Bathool</td>
        </tr>
        <tr>
            <td class="label">Age (പ്രായം)</td>
            <td>18 Years</td>
        </tr>
        <tr>
            <td class="label">Place (സ്ഥലം)</td>
            <td>Erattupetta, Kottayam</td>
        </tr>
        <tr>
            <td class="label">Education (വിദ്യാഭ്യാസം)</td>
            <td>[Higher Secondary / Degree - Type Here]</td>
        </tr>
    </table>

    <div class="form-section">
        <h3> താൽപര്യമുണ്ടെങ്കിൽ താങ്കളുടെ വിവരങ്ങൾ ഇവിടെ സമർപ്പിക്കുക (Form for Varan)</h3>
        
        <form action="YOUR_FORMSPREE_URL_HERE" method="POST">
            <div class="form-group">
                <label for="groom-name">Groom's Name (വരന്റെ പേര്) *</label>
                <input type="text" id="groom-name" name="Groom_Name" required placeholder="Enter groom's full name">
            </div>

            <div class="form-group">
                <label for="groom-age">Age (പ്രായം) *</label>
                <input type="number" id="groom-age" name="Groom_Age" required placeholder="Enter age">
            </div>

            <div class="form-group">
                <label for="groom-place">Place (സ്ഥലം) *</label>
                <input type="text" id="groom-place" name="Groom_Place" required placeholder="Enter native place">
            </div>

            <div class="form-group">
                <label for="groom-job">Education & Job (വിദ്യാഭ്യാസവും ജോലിയും) *</label>
                <input type="text" id="groom-job" name="Groom_Education_Job" required placeholder="e.g., B.Com, Accountant in Gulf">
            </div>

            <div class="form-group">
                <label for="groom-phone">Contact Number (ഫോൺ നമ്പർ) *</label>
                <input type="tel" id="groom-phone" name="Contact_Number" required placeholder="Enter phone or WhatsApp number">
            </div>

            <button type="submit" class="submit-btn">Submit Proposal</button>
        </form>
    </div>
</div>

<script>
    function toggleImage(imgId) {
        // Adyam ella image box-കളും hide cheyyunnu
        var allBoxes = document.getElementsByClassName('sub-img-box');
        for (var i = 0; i < allBoxes.length; i++) {
            if (allBoxes[i].id !== imgId) {
                allBoxes[i].style.display = 'none';
            }
        }

        // Click cheytha image ippo block aano ennu chack cheyth hide/show cheyyunnu
        var targetBox = document.getElementById(imgId);
        if (targetBox.style.display === 'block') {
            targetBox.style.display = 'none';
        } else {
            targetBox.style.display = 'block';
        }
    }
</script>

</body>
    </html>
